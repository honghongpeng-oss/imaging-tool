<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Statistics Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .upload-area {
            background: white;
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(to bottom, #f8f9ff, #f0f1ff);
        }
        
        .upload-box:hover {
            border-color: #764ba2;
            background: linear-gradient(to bottom, #f0f1ff, #e8e9ff);
        }
        
        .upload-box.dragover {
            background: linear-gradient(to bottom, #e8e9ff, #dcdeff);
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }
        
        #fileInput {
            display: none;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .image-preview {
            text-align: center;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stats-container {
            display: grid;
            gap: 20px;
        }
        
        .stat-group {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
        }
        
        .stat-group h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 12px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-weight: 600;
            color: #333;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: 500;
            word-break: break-word;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #c62828;
        }
        
        .hidden {
            display: none;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .export-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Image Statistics Analyzer</h1>
            <p class="subtitle">Upload an image to analyze all its statistical properties</p>
        </header>
        
        <div class="upload-area">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Click to upload or drag & drop</div>
                <div class="upload-hint">Supported formats: JPG, PNG, BMP, TIFF, GIF, WebP (Max 500MB)</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>
        
        <div id="loadingContainer" class="hidden">
            <div class="card">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Analyzing image...</p>
                </div>
            </div>
        </div>
        
        <div id="errorContainer" class="hidden"></div>
        
        <div id="resultsContainer" class="hidden">
            <div class="content">
                <div class="card">
                    <h2>🖼️ Image Preview</h2>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                
                <div class="card">
                    <h2>📋 File Information</h2>
                    <div id="fileStats"></div>
                    <button class="export-btn" onclick="exportStats()">⬇️ Export as JSON</button>
                </div>
            </div>
            
            <div class="card">
                <h2>🎯 Camera Type Detection</h2>
                <div id="cameraDetection"></div>
            </div>
            
            <div class="card">
                <h2>📊 Detailed Statistics</h2>
                <div id="statsContainer"></div>
            </div>
        </div>
    </div>
    
    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const loadingContainer = document.getElementById('loadingContainer');
        const errorContainer = document.getElementById('errorContainer');
        const resultsContainer = document.getElementById('resultsContainer');
        let currentStats = null;
        
        // Upload box click
        uploadBox.addEventListener('click', () => fileInput.click());
        
        // Drag and drop
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });
        
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });
        
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });
        
        // File input change
        fileInput.addEventListener('change', handleFileSelect);
        
        function handleFileSelect() {
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            uploadImage(file);
        }
        
        function uploadImage(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // Show loading
            loadingContainer.classList.remove('hidden');
            errorContainer.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    currentStats = data.stats;
                    displayResults(data.image, data.stats);
                }
            })
            .catch(error => {
                showError('Failed to upload: ' + error.message);
            })
            .finally(() => {
                loadingContainer.classList.add('hidden');
            });
        }
        
        function displayResults(imageData, stats) {
            // Display image
            document.getElementById('imagePreview').innerHTML = 
                `<img src="${imageData}" alt="Uploaded image">`;
            
            // Display file stats
            const fileStatsHtml = `
                <div class="stat-group">
                    <div class="stat-item">
                        <span class="stat-label">File Name:</span>
                        <span class="stat-value">${stats.file.name}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">File Size:</span>
                        <span class="stat-value">${stats.file.size}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Modified:</span>
                        <span class="stat-value">${stats.file.modified}</span>
                    </div>
                </div>
            `;
            document.getElementById('fileStats').innerHTML = fileStatsHtml;
            
            // Display camera type detection
            if (stats.camera_type) {
                const confidence = stats.camera_type.confidence;
                const confidenceColor = confidence > 80 ? '#28a745' : confidence > 60 ? '#ffc107' : '#dc3545';
                
                const cameraHtml = `
                    <div class="stat-group">
                        <div class="stat-item">
                            <span class="stat-label">Detected Type:</span>
                            <span class="stat-value" style="color: ${confidenceColor}; font-weight: bold;">
                                ${stats.camera_type.likely_type}
                            </span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Confidence:</span>
                            <span class="stat-value">${confidence}%</span>
                        </div>
                        <div style="width: 100%; background: #e0e0e0; height: 8px; border-radius: 4px; margin: 10px 0;">
                            <div style="background: ${confidenceColor}; height: 100%; width: ${confidence}%; border-radius: 4px;"></div>
                        </div>
                        ${stats.camera_type.analysis ? `
                        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd;">
                            <h4 style="color: #667eea; margin-bottom: 8px;">Analysis Details:</h4>
                            ${createStatItems(stats.camera_type.analysis)}
                        </div>
                        ` : ''}
                    </div>
                `;
                document.getElementById('cameraDetection').innerHTML = cameraHtml;
            }
            
            // Display detailed stats
            const statsHtml = `
                <div class="stat-group">
                    <h3>📐 Image Properties</h3>
                    ${createStatItems(stats.properties)}
                </div>
                <div class="stat-group">
                    <h3>📊 Pixel Statistics</h3>
                    ${createStatItems(stats.pixels)}
                </div>
                ${stats.color && Object.keys(stats.color).length > 0 ? `
                <div class="stat-group">
                    <h3>🎨 Color Statistics</h3>
                    ${createStatItems(stats.color)}
                </div>
                ` : ''}
                <div class="stat-group">
                    <h3>🔊 Noise Analysis</h3>
                    ${createStatItems(stats.noise)}
                </div>
                <div class="stat-group">
                    <h3>⚙️ Quality Metrics</h3>
                    ${createStatItems(stats.quality)}
                </div>
            `;
            document.getElementById('statsContainer').innerHTML = statsHtml;
            
            resultsContainer.classList.remove('hidden');
        }
        
        function createStatItems(obj) {
            return Object.entries(obj)
                .map(([key, value]) => `
                    <div class="stat-item">
                        <span class="stat-label">${formatLabel(key)}:</span>
                        <span class="stat-value">${value}</span>
                    </div>
                `)
                .join('');
        }
        
        function formatLabel(key) {
            return key
                .replace(/_/g, ' ')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }
        
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">❌ ${message}</div>`;
            errorContainer.classList.remove('hidden');
        }
        
        function exportStats() {
            if (!currentStats) return;
            
            const dataStr = JSON.stringify(currentStats, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `image_stats_${Date.now()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
